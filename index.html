<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
header { background: var(--primary); color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 1.1rem; font-weight: 700; }
#hdr-info { font-size: .78rem; opacity: .85; text-align: right; line-height: 1.5; }

/* Input */
.input-card { background: var(--card); margin: 12px; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.input-card h2 { font-size: .82rem; font-weight: 600; color: var(--muted); margin-bottom: 10px; }
.input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
input[type=number] { border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 6px; font-size: .95rem; text-align: center; width: 60px; outline: none; -moz-appearance: textfield; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number]:focus { border-color: var(--primary); }
#inp-period { width: 96px; }
.num-wrap { display: flex; gap: 5px; }
.btn { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-size: .88rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background .15s; }
.btn:hover { background: var(--primary-dk); }
.btn-gray { background: #94a3b8; }
.btn-gray:hover { background: #64748b; }
.btn-red { background: #dc2626; }
.btn-red:hover { background: #b91c1c; }

/* Tabs */
.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; padding: 0 12px; }
.tab-btn { border: none; background: none; padding: 11px 14px; font-size: .83rem; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2.5px solid transparent; white-space: nowrap; transition: all .15s; }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

/* Content */
#content { padding: 12px; max-width: 760px; margin: 0 auto; }

/* Card */
.card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.card h3 { font-size: .93rem; font-weight: 700; margin-bottom: 12px; }
.sec-lbl { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }

/* Balls */
.ball { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; font-size: .82rem; font-weight: 700; margin: 2px; flex-shrink: 0; }
.ball-sm { width: 26px; height: 26px; font-size: .72rem; margin: 1px; }
.z1 { background: var(--z1-bg); color: var(--z1); }
.z2 { background: var(--z2-bg); color: var(--z2); }
.z3 { background: var(--z3-bg); color: var(--z3); }
.z4 { background: var(--z4-bg); color: var(--z4); }
.zx { background: #f1f5f9; color: #94a3b8; }

/* Tags */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: .72rem; font-weight: 600; }
.tag-hot { background: #fee2e2; color: #dc2626; }
.tag-cold { background: #dbeafe; color: #2563eb; }
.tag-od { background: var(--od-bg); color: var(--od); }
.tag-warn { background: var(--warn-bg); color: var(--warn); }
.tag-ok { background: #dcfce7; color: #16a34a; }
.tag-gray { background: #f1f5f9; color: var(--muted); }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: .83rem; }
th { text-align: left; padding: 7px 8px; color: var(--muted); font-weight: 600; border-bottom: 1.5px solid var(--border); font-size: .75rem; }
td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }

/* Alerts */
.alert { border-radius: 8px; padding: 10px 12px; font-size: .83rem; margin-bottom: 8px; line-height: 1.6; }
.alert-danger { background: #fee2e2; color: #991b1b; }
.alert-warn { background: var(--warn-bg); color: #92400e; }
.alert-od { background: var(--od-bg); color: #6b21a8; }
.alert-ok { background: #dcfce7; color: #166534; }
.alert-blue { background: #dbeafe; color: #1e40af; }

/* Group cards */
.grp { border: 1.5px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.grp-title { font-size: .9rem; font-weight: 700; margin-bottom: 10px; }
.grp-nums { display: flex; gap: 2px; flex-wrap: wrap; margin-bottom: 8px; }
.grp-meta { font-size: .79rem; color: var(--muted); line-height: 1.7; }
.verify-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }

/* Stats */
.zone-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.zone-box { border-radius: 8px; padding: 10px 8px; text-align: center; }
.zone-box .val { font-size: 1.4rem; font-weight: 700; }
.zone-box .lbl { font-size: .7rem; color: var(--muted); margin-top: 2px; }

/* Tail grid */
.tail-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; }
.tail-cell { border-radius: 8px; padding: 8px 4px; text-align: center; background: var(--bg); }
.tail-cell .tv { font-size: 1.1rem; font-weight: 700; }
.tail-cell .tl { font-size: .68rem; color: var(--muted); margin-top: 2px; }
.bar-wrap { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 5px; }
.bar-fill { height: 100%; border-radius: 3px; }

/* Num row */
.num-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.num-row:last-child { border-bottom: none; }

/* OD bar */
.od-bar { flex: 1; }
.od-label { min-width: 44px; text-align: right; font-size: .8rem; font-weight: 700; }

/* Empty */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: .88rem; }

/* Settings textarea */
textarea { width: 100%; height: 180px; font-family: monospace; font-size: .78rem; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px; resize: vertical; outline: none; }
textarea:focus { border-color: var(--primary); }

@media (max-width: 480px) {
  .zone-grid { grid-template-columns: repeat(2,1fr); }
  .input-row { flex-direction: column; align-items: flex-start; }
}
</style>

// ── STORAGE ────────────────────────────────────────────────
let rec = [], st = {}, retHist = {}, conStat = {};
let pendingPick = null;  // {strategies:{G1:[...], ...}, ts: timestamp}
let pickLog = [];        // [{period, strategies, result, hits, ts}]
// retHist[num] = [{period, gap}, ...]
// conStat[num] = {total, repeats, followedBy:{m:count,...}}
//   total      = times num appeared as "previous draw" predecessor
//   repeats    = times num also appeared in the very next draw (連莊)
//   followedBy = for each number m, how many times m appeared in the next draw after num

function buildConStat(records) {
  const s = {};
  const ordered = [...records].reverse(); // chronological
  for (let i = 0; i < ordered.length - 1; i++) {
    const prev = ordered[i].n, curr = ordered[i+1].n;
    prev.forEach(n => {
      if (!s[n]) s[n] = {total:0, repeats:0, followedBy:{}};
      s[n].total++;
      if (curr.includes(n)) s[n].repeats++;
      curr.forEach(m => { s[n].followedBy[m] = (s[n].followedBy[m]||0)+1; });
    });
  }
  return s;
}

// ── CORE ANALYSIS ──────────────────────────────────────────
const od   = n => st[n] ? +(st[n].ab / st[n].ag).toFixed(2) : 0;
const sat  = n => st[n] ? +((st[n].ab / st[n].mg)*100).toFixed(1) : 0;
const excl = n => st[n] ? st[n].ab >= st[n].mg : true;

function candidates() { return Array.from({length:39},(_,i)=>i+1).filter(n=>!excl(n)); }
function excluded()   { return Array.from({length:39},(_,i)=>i+1).filter(n=>excl(n)); }

function zoneCounts(sliceN=10) {
  const c={1:0,2:0,3:0,4:0};
  rec.slice(0,sliceN).forEach(r=>r.n.forEach(n=>{c[Z(n)]++;}));
  return c;
}

function hotCold(zc) {
  const maxODinZone = z => {
    const pool = candidates().filter(n=>Z(n)===z);
    return pool.length ? Math.max(...pool.map(od)) : 0;
  };
  const sorted = [1,2,3,4].sort((a,b)=>{
    if (zc[b]!==zc[a]) return zc[b]-zc[a];
    return maxODinZone(b)-maxODinZone(a);
  });
  return {hot:sorted[0], cold:sorted[3]};
}

function tailCounts(n=10) {
  const c={};
  for(let i=0;i<=9;i++) c[i]=0;
  rec.slice(0,n).forEach(r=>r.n.forEach(num=>{c[num%10]++;}));
  return c;
}

// ── GROUP GENERATION ───────────────────────────────────────
const byOD = arr => [...arr].sort((a,b)=>od(b)-od(a));

// Composite pressure: overdue ratio (60%) + historical saturation (40%)
// Prevents numbers with huge max-gap (like 11, max=92) from over-ranking
function cs(n) {
  if(!st[n]) return 0;
  const s=st[n];
  return (s.ab/s.ag)*0.6 + (s.ab/s.mg)*3*0.4;
}
const byCS = arr => [...arr].sort((a,b)=>cs(b)-cs(a));

function consecPair(pool) {
  const s=[...pool].sort((a,b)=>a-b);
  let best=null, bestR=-1;
  for(let i=0;i<s.length-1;i++) {
    if(s[i+1]-s[i]===1) {
      const r=od(s[i])+od(s[i+1]);
      if(r>bestR){bestR=r;best=[s[i],s[i+1]];}
    }
  }
  return best;
}

function genG1(cand, hot) {
  const byZ={};
  for(let z=1;z<=4;z++) byZ[z]=byOD(cand.filter(n=>Z(n)===z));
  const hp=byZ[hot];
  if(hp.length<3) return null;

  const pair=consecPair(hp);
  let hotPicks;
  if(pair){
    const rest=byOD(hp.filter(n=>!pair.includes(n)));
    if(!rest[0]) return null;
    hotPicks=[...pair, rest[0]];
  } else {
    hotPicks=hp.slice(0,3);
  }

  const others=[1,2,3,4].filter(z=>z!==hot);
  const oPicks=[];
  for(const z of others){
    if(byZ[z][0]!==undefined){ oPicks.push(byZ[z][0]); if(oPicks.length===2) break; }
  }
  if(oPicks.length<2) return null;
  return {nums:[...hotPicks,...oPicks].sort((a,b)=>a-b), pair, hot};
}

function genG2(cand, cold) {
  const pool=byOD(cand.filter(n=>Z(n)!==cold));
  if(pool.length<5) return null;
  return {nums:pool.slice(0,5).sort((a,b)=>a-b), cold};
}

function genG3(cand, cold) {
  const others=[1,2,3,4].filter(z=>z!==cold);
  const byZ={};
  [1,2,3,4].forEach(z=>{byZ[z]=byOD(cand.filter(n=>Z(n)===z));});
  if(byZ[cold].length<2||others.some(z=>byZ[z].length<1)) return null;

  const LIM=6;
  const cp=byZ[cold].slice(0,LIM+1);
  const o=[others.map(z=>byZ[z].slice(0,LIM))];
  const [oa,ob,oc]=[byZ[others[0]].slice(0,LIM),byZ[others[1]].slice(0,LIM),byZ[others[2]].slice(0,LIM)];

  let best=null, bestOD=-1;
  for(let ci=0;ci<cp.length;ci++)
    for(let cj=ci+1;cj<cp.length;cj++)
      for(let a=0;a<oa.length;a++)
        for(let b=0;b<ob.length;b++)
          for(let c=0;c<oc.length;c++){
            const pick=[cp[ci],cp[cj],oa[a],ob[b],oc[c]];
            const s=pick.reduce((x,y)=>x+y,0);
            if(s>=85&&s<=115){
              const r=pick.reduce((x,y)=>x+od(y),0);
              if(r>bestOD){bestOD=r;best=pick;}
            }
          }

  if(!best) best=[cp[0],cp[1],oa[0],ob[0],oc[0]];
  return {nums:best.sort((a,b)=>a-b), cold};
}

function genG4(cand) {
  const superOD=cand.filter(n=>od(n)>=2.0);
  // Use composite score: overdue ratio + historical saturation
  const sorted=byCS(cand);
  const picks=sorted.slice(0,5);
  return {nums:picks.sort((a,b)=>a-b), allSuper:superOD.length>=5};
}

// G5: Tail Bias Strategy — 2026年度實測偏移（尾1+17.5%最熱，尾0-21.7%最冷）
function genG5(cand) {
  const tailW={1:3.5, 2:2.4, 5:2.4, 6:2.4, 8:2.2, 7:-1.0, 3:-2.6, 4:-2.6, 9:-3.4, 0:-4.3};
  const scored=cand
    .map(n=>({n, score:(tailW[n%10]||0)+od(n)*0.3}))
    .sort((a,b)=>b.score-a.score);
  const picks=scored.slice(0,5).map(x=>x.n);
  const highTailCnt=picks.filter(n=>n%10===1||n%10===8||n%10===6||n%10===2||n%10===5).length;
  const coldTailCnt=picks.filter(n=>n%10===0||n%10===9).length;
  return {nums:picks.sort((a,b)=>a-b), highTailCnt, coldTailCnt};
}

// G6: 2026年度規律流（熱號08強制入選 + 年度頻率加權 + 2026尾數偏移）
function genG6(cand) {
  const maxF=32;
  const must=cand.includes(8)?[8]:[];
  const pool=cand.filter(n=>!must.includes(n));
  const scored=pool.map(n=>({
    n,
    score:(ANNUAL.freq[n]/maxF)*50+(ANNUAL.tailBias[n%10]/17.5)*30+od(n)*20
  })).sort((a,b)=>b.score-a.score);
  const picks=[...must,...scored.slice(0,5-must.length).map(x=>x.n)];
  return {nums:picks.sort((a,b)=>a-b), forced08:must.includes(8)};
}

function allGroups() {
  const cand=candidates();
  const zc=zoneCounts(10);
  const {hot,cold}=hotCold(zc);
  return {cand,zc,hot,cold,g1:genG1(cand,hot),g2:genG2(cand,cold),g3:genG3(cand,cold),g4:genG4(cand),g5:genG5(cand),g6:genG6(cand)};
}

// 依本期5碼的歷史「下期跟出」頻率，預測下期各號被帶動強度
// 三信號合成預測：S1牽引(40%) + S2逾期壓力(35%) + S3年度熱度(25%)
function predictNextDraw() {
  if(!rec[0]) return [];
  const last = rec[0].n;

  // S1：連莊牽引（本期5碼的 followedBy 加總）
  const s1raw = {};
  last.forEach(n => {
    const cst = conStat[n];
    if(!cst || !cst.followedBy) return;
    Object.entries(cst.followedBy).forEach(([m, cnt]) => { s1raw[+m] = (s1raw[+m]||0) + cnt; });
  });
  const s1max = Math.max(...Object.values(s1raw), 1);

  // S2：逾期壓力（複合評分 cs(n) = 逾期倍數×0.6 + 歷史飽和度×0.4）
  const allNums = Array.from({length:39},(_,i)=>i+1).filter(n=>!excl(n));
  const s2max = Math.max(...allNums.map(n=>cs(n)), 0.01);

  // S3：年度熱度（2026頻率排名 × 70% + 尾數偏移 × 30%）
  const annMax = Math.max(...ANNUAL.freq.slice(1));
  const s3fn = n => (ANNUAL.freq[n]/annMax)*70 + Math.max(0, ANNUAL.tailBias[n%10]||0)/17.5*30;
  const s3max = Math.max(...allNums.map(s3fn), 0.01);

  return allNums.map(n => {
    const n1 = (s1raw[n]||0)/s1max, n2 = cs(n)/s2max, n3 = s3fn(n)/s3max;
    const combined = +(n1*40 + n2*35 + n3*25).toFixed(1);
    const s1p=+(n1*100).toFixed(0), s2p=+(n2*100).toFixed(0), s3p=+(n3*100).toFixed(0);
    return {
      n, combined, s1p, s2p, s3p,
      sigCount: (s1p>=55?1:0)+(s2p>=55?1:0)+(s3p>=55?1:0),
      isLast: last.includes(n),
      isOD: od(n)>=1.0,
      isSuperOD: od(n)>=2.0,
      isAlert9: st[n]?.ab===9,
    };
  }).sort((a,b)=>b.combined-a.combined);
}

function observation(R,w9,sOD){
  const lines=[];
  const zd=R.zoneDist;
  const zero=[1,2,3,4].filter(z=>zd[z]===0);
  if(zero.length) lines.push(`本期 ${zero.map(z=>ZL[z]).join('、')} 開出0碼，斷區走勢是否延續值得觀察。`);
  const maxZ=[1,2,3,4].reduce((a,b)=>zd[a]>zd[b]?a:b);
  if(zd[maxZ]>=3) lines.push(`${ZL[maxZ]} 本期強勢開出 ${zd[maxZ]} 碼，注意是否延續。`);
  if(w9.length) lines.push(`${w9.map(f2).join('、')} 號已沉寂9期，下期若未開即列排除。`);
  if(sOD.length) lines.push(`超期候選：${sOD.slice(0,3).map(n=>`${f2(n)}（×${od(n)}倍）`).join('、')} 回歸壓力持續。`);
  if(!lines.length) lines.push('本期走勢平穩，無特殊異常，可參考選號分析。');
  return lines.join('<br>');
}

// ── RENDER: STATS ──────────────────────────────────────────
function renderStats(el){
  const zc10=zoneCounts(10);
  const zc5r=zoneCounts(5);
  const zc5p={1:0,2:0,3:0,4:0};
  rec.slice(5,10).forEach(r=>r.n.forEach(n=>{zc5p[Z(n)]++;}));

  const tc=tailCounts(10);
  const maxT=Math.max(...Object.values(tc));

  // Long-term tail analysis using t50/t100 accumulated data
  const tail50={}, tail100={};
  for(let t=0;t<=9;t++){tail50[t]=0;tail100[t]=0;}
  for(let n=1;n<=39;n++){
    if(st[n]){tail50[n%10]+=st[n].t50;tail100[n%10]+=st[n].t100;}
  }
  // Expected: tail0 has 3 nums, tails 1-9 have 4 nums each
  const exp50 = t => t===0?+(50*5*3/39).toFixed(1):+(50*5*4/39).toFixed(1);
  const exp100 = t => t===0?+(100*5*3/39).toFixed(1):+(100*5*4/39).toFixed(1);
  const tailBias50 = t => +((tail50[t]/exp50(t)-1)*100).toFixed(1);
  const tailsSorted50 = Array.from({length:10},(_,i)=>i).sort((a,b)=>tailBias50(b)-tailBias50(a));

  const topOD=candidates().sort((a,b)=>od(b)-od(a)).slice(0,10);

  // Return history stats
  function retStats(n) {
    const h = retHist[n];
    if (!h || h.length === 0) return null;
    const gaps = h.map(x=>x.gap);
    const avg = (gaps.reduce((a,b)=>a+b,0)/gaps.length).toFixed(1);
    return { count: h.length, avg, min: Math.min(...gaps), max: Math.max(...gaps), last: h[h.length-1] };
  }

  // Numbers with any return history, sorted by count desc
  const numsWithHist = Array.from({length:39},(_,i)=>i+1)
    .filter(n => retHist[n] && retHist[n].length > 0)
    .sort((a,b) => (retHist[b]?.length||0) - (retHist[a]?.length||0));

  el.innerHTML=`
  <div class="card">
    <h3>📊 區間走勢（近5期 vs 前5期）</h3>
    <table>
      <thead><tr><th>區間</th><th>前5期</th><th>近5期</th><th>合計</th><th>趨勢</th></tr></thead>
      <tbody>${[1,2,3,4].map(z=>{
        const r5=zc5r[z],p5=zc5p[z];
        const tr=r5>p5?'升溫🔺':r5<p5?'降溫🔻':'持平➡';
        return `<tr><td><span style="color:var(--z${z});font-weight:600">${ZN[z]}</span></td>
          <td>${p5}</td><td style="font-weight:600">${r5}</td><td>${zc10[z]}</td><td>${tr}</td></tr>`;
      }).join('')}</tbody>
    </table>
  </div>

  <div class="card">
    <h3>📉 長期尾數偏移分析（選號核心規律）</h3>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:10px">依50期偏移排序。此規律在50期、100期均高度穩定，為尾數優先流的理論依據。</p>
    <table>
      <thead><tr><th>尾數</th><th>50期實際</th><th>50期理論</th><th>偏移</th><th>100期偏移</th><th>號碼</th></tr></thead>
      <tbody>${tailsSorted50.map(t=>{
        const b50=tailBias50(t);
        const b100=+((tail100[t]/exp100(t)-1)*100).toFixed(1);
        const nums=Array.from({length:39},(_,i)=>i+1).filter(n=>n%10===t);
        const color=b50>=20?'#dc2626':b50<=-15?'#2563eb':b50>=10?'#d97706':'var(--text)';
        const bg=b50>=20?'#fee2e2':b50<=-15?'#dbeafe':'';
        return `<tr style="background:${bg}">
          <td><strong style="font-size:1rem;color:${color}">尾${t}</strong></td>
          <td style="text-align:center;font-weight:600;color:${color}">${tail50[t]}</td>
          <td style="text-align:center;color:var(--muted)">${exp50(t)}</td>
          <td style="text-align:center;font-weight:700;color:${color}">${b50>0?'+':''}${b50}%</td>
          <td style="text-align:center;color:${b100>=10?'#dc2626':b100<=-10?'#2563eb':'var(--muted)'}">${b100>0?'+':''}${b100}%</td>
          <td style="font-size:.75rem;color:var(--muted)">${nums.map(f2).join(', ')}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
    <div style="margin-top:8px;font-size:.75rem;color:var(--muted)">理論值基於等機率分佈：尾0（3個號）期望值較低，其餘尾數（4個號）期望值較高</div>

      : `<table>

      <tbody>${numsWithHist.map(n => {

        return `<tr>

          <td style="text-align:center">

          </td>

// ── RENDER: TRACK ──────────────────────────────────────────
function backtestGroups() {
  const {g1,g2,g3,g4,g5,g6} = allGroups();
  const pred = predictNextDraw();
  const g7 = pred.length>=5 ? {nums:pred.slice(0,5).map(x=>x.n)} : null;
  const grps = [
    {key:'G1', label:'🔥強勢區間', g:g1},
    {key:'G2', label:'🧊極端斷區', g:g2},
    {key:'G3', label:'⚖️均勻分佈', g:g3},
    {key:'G4', label:'⭐超期回歸', g:g4},
    {key:'G5', label:'🎯尾數優先', g:g5},
    {key:'G6', label:'📈年度規律', g:g6},
    {key:'G7', label:'📡牽引預測', g:g7},
  ];
  const draws = rec.slice(0, Math.min(20, rec.length));
  return grps.map(({key,label,g}) => {
    if(!g) return {key, label, valid:false};
    const mc = draws.map(r => g.nums.filter(n => r.n.includes(n)).length);
    const total = mc.length;
    const avg = total ? +(mc.reduce((a,b)=>a+b,0)/total).toFixed(2) : 0;
    const randExp = +(5*5/39).toFixed(2);
    return {key, label, nums:g.nums, avg, randExp,
      hit3: mc.filter(m=>m>=3).length, hit2: mc.filter(m=>m>=2).length,
      hit1: mc.filter(m=>m>=1).length, maxM: total?Math.max(...mc):0, total, valid:true};
  });
}

    </table></div>
    <div style="margin-top:8px;display:flex;gap:12px;flex-wrap:wrap;font-size:.78rem;color:var(--muted)">
      ${gKeys.filter(k=>logAvg[k]!==undefined).map(k=>
        `<span>${gNames[k].slice(0,4)}平均：<strong style="color:${logAvg[k]>=1.0?'#16a34a':logAvg[k]>=0.5?'#d97706':'#94a3b8'}">${logAvg[k]}</strong>碼</span>`
      ).join('')}
    </div>
    <button onclick="if(confirm('確認清空全部押注紀錄？'))pickLog=[];savePickLog();render();" class="btn btn-red" style="margin-top:10px;font-size:.75rem;padding:5px 12px">清空紀錄</button>`;

  el.innerHTML = `
  <div class="card">
    <h3>🔒 本期預測狀態</h3>
    ${pendHTML}
  </div>

  <div class="card" style="background:linear-gradient(135deg,#f0fdf4,#fffbeb)">
    <h3>💡 策略修正建議</h3>
    ${sugg.map(s=>`<div style="font-size:.84rem;line-height:1.85;padding:5px 0;border-bottom:1px solid var(--border)">${s}</div>`).join('')}
  </div>

  <div class="card">
    <h3>📊 策略近期回測（當前選號 vs 近 ${N} 期開獎）</h3>
    <div class="alert alert-blue" style="font-size:.76rem;margin-bottom:10px">
      ⓘ 說明：以「當前狀態」生成的選號與歷史開獎比對。G4超期回歸流因選超期號（定義上近期少出現），此回測天生偏低，請以實際押注紀錄為準。
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>策略</th><th>本期選號</th><th>平均命中</th><th>1碼+</th><th>2碼+</th><th>3碼+</th><th>最高</th><th>評估</th></tr></thead>
      <tbody>${bt.map(g => {
        if(!g.valid) return `<tr><td colspan="8" style="color:var(--muted);font-size:.78rem">${g.label} — 候選號碼不足</td></tr>`;
        const grade = g.avg>=1.5?'優秀':g.avg>=1.0?'良好':g.avg>=0.6?'普通':'偏低';
        const clr = g.avg>=1.5?'#dc2626':g.avg>=1.0?'#d97706':g.avg>=0.6?'var(--muted)':'#2563eb';
        return `<tr>
          <td style="font-size:.78rem;font-weight:600">${g.label}</td>
          <td style="font-size:.68rem;color:var(--muted)">${g.nums.map(f2).join(' ')}</td>
          <td style="text-align:center;font-weight:700;color:${clr}">${g.avg}</td>
          <td style="text-align:center;font-size:.8rem">${g.hit1}/${g.total}</td>
          <td style="text-align:center;font-size:.8rem">${g.hit2}/${g.total}</td>
          <td style="text-align:center;font-size:.8rem">${g.hit3}/${g.total}</td>
          <td style="text-align:center">${g.maxM}</td>
          <td><span class="tag ${g.avg>=1.5?'tag-hot':g.avg>=1.0?'tag-warn':'tag-gray'}">${grade}</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
    <div style="font-size:.72rem;color:var(--muted);margin-top:8px">隨機基準：每5碼選號平均命中 ≈ 0.64碼（5×5/39）</div>
  </div>

  <div class="card">
    <h3>🏆 歷史押注命中紀錄（${pickLog.length} 筆）</h3>
    ${logHTML}
  </div>`;
}

// ── RENDER: SETTINGS ───────────────────────────────────────
function renderSettings(el){
  el.innerHTML=`
  <div class="card">
    <h3>⚙️ 更新遺漏統計表</h3>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:10px">每隔約50期從樂透研究院網站複製最新資料貼入，更新平均間隔、最大間隔等長期數據。<br>格式：每行「號碼 最大間隔 平均間隔 最多連續 最近未出現期數 出現總數 20期 50期 100期」</p>
    <textarea id="st-paste" placeholder="1 44 7.476 4 3 787 1 7 11&#10;2 46 7.766 4 8 757 5 12 19&#10;…"></textarea>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <button class="btn" onclick="applyStats()">套用更新</button>
      <button class="btn btn-red" onclick="resetAll()">重設所有資料</button>
    </div>
  </div>

  <div class="card">
    <h3>📊 目前各號碼狀態</h3>
    <table>
      <thead><tr><th>號碼</th><th>沉寂期</th><th>平均間隔</th><th>最大間隔</th><th>逾期倍數</th></tr></thead>
      <tbody>${Array.from({length:39},(_,i)=>i+1).map(n=>{
        const s=st[n], r=od(n), ex=excl(n);
        return `<tr style="${ex?'background:#fee2e2':''}">
          <td>${ex?ballX(n,'ball-sm'):ball(n,'ball-sm')}</td>
          <td>${s.ab}</td><td>${s.ag}</td><td>${s.mg}</td>
          <td style="color:${ex?'#dc2626':r>=2?'var(--od)':r>=1?'var(--warn)':'var(--muted)'};font-weight:${r>=1||ex?'700':'400'}">
            ${ex?'🚫排除':'×'+r}
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>`;
}

function applyStats(){
  const raw=document.getElementById('st-paste').value.trim();
  if(!raw) return;
  let cnt=0;
  raw.split('\n').forEach(line=>{
    const p=line.trim().split(/\s+/).map(Number);
    if(p.length>=9){
      const [num,mg,ag,mc,ab,tt,t20,t50,t100]=p;
      if(num>=1&&num<=39){ st[num]={mg,ag,mc,ab,tt,t20,t50,t100}; cnt++; }
    }
  });
  save();
  alert(`已更新 ${cnt} 個號碼`);
  render();
}

function resetAll(){
  if(!confirm('確認重設全部資料回預設值？\n（含開獎紀錄、統計、押注紀錄）')) return;
  rec=JSON.parse(JSON.stringify(BASE_REC));
  st=JSON.parse(JSON.stringify(BASE_ST));
  retHist={};
  conStat=buildConStat(rec);
  pendingPick=null;
  pickLog=[];
  savePickLog();
  save();
  lastReport=null;
  updateHdr();
  alert(`✅ 已重設完成！\n資料截至第 ${rec[0].p} 期，共 ${rec.length} 筆開獎紀錄。\n押注紀錄已清空。`);
  go('pick');
}

// ── ADD DRAW ───────────────────────────────────────────────
function addDraw(){
  const pv=parseInt(document.getElementById('inp-period').value);
  const ni=[...document.querySelectorAll('.ni')];
  const nums=ni.map(i=>parseInt(i.value)).filter(n=>n>=1&&n<=39);

  if(!pv||pv<100000){ alert('請輸入有效期號（6位數）'); return; }
  if(nums.length!==5){ alert('請輸入5個 01–39 的號碼'); return; }
  if(new Set(nums).size!==5){ alert('號碼不可重複'); return; }
  if(rec[0]&&pv<=rec[0].p){ alert(`期號需大於目前最新期（${rec[0].p}）`); return; }

  const sorted=nums.sort((a,b)=>a-b);

  // snapshot pre-update stats for report
  const drawn=sorted.map(n=>({n,abBefore:st[n]?st[n].ab:0,ratio:od(n)}));
  const zd={1:0,2:0,3:0,4:0}; sorted.forEach(n=>{zd[Z(n)]++;});

  // record return history BEFORE updating absent counts
  sorted.forEach(n => {
    const gap = st[n] ? st[n].ab : 0;
    if (!retHist[n]) retHist[n] = [];
    retHist[n].push({period: pv, gap});
  });

  // record consecutive stat: prev draw → current draw
  const repeatNums = [];
  if (rec.length > 0) {
    const prev = rec[0].n;
    prev.forEach(n => {
      if (!conStat[n]) conStat[n] = {total:0, repeats:0, followedBy:{}};
      conStat[n].total++;
      if (sorted.includes(n)) { conStat[n].repeats++; repeatNums.push(n); }
      sorted.forEach(m => { conStat[n].followedBy[m] = (conStat[n].followedBy[m]||0)+1; });
    });
  }

  // update stats
  for(let n=1;n<=39;n++){
    if(!st[n]) continue;
    st[n].ab = sorted.includes(n) ? 0 : st[n].ab+1;
  }

  // check pending pick against this draw result
  if(pendingPick) {
    const hits = {};
    for(const [k,nums] of Object.entries(pendingPick.strategies)) {
      hits[k] = nums.filter(n => sorted.includes(n)).length;
    }
    pickLog.unshift({period:pv, strategies:pendingPick.strategies, result:sorted, hits, ts:pendingPick.ts});
    pendingPick = null;
    savePickLog();
  }

  // add record
  rec.unshift({p:pv,n:sorted});
  save();

  lastReport={period:pv,nums:sorted,drawn,zoneDist:zd,repeatNums};

  // clear inputs
  document.getElementById('inp-period').value='';
  ni.forEach(i=>{i.value='';});

  updateHdr();
  go('pick');
}

// ── KEYBOARD SHORTCUTS ─────────────────────────────────────
document.getElementById('inp-period').addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key==='\t') document.querySelectorAll('.ni')[0].focus();
});
document.querySelectorAll('.ni').forEach((inp,i,all)=>{
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter') i<all.length-1 ? all[i+1].focus() : addDraw();
  });
  inp.addEventListener('input',()=>{
    if(inp.value.length>=2&&i<all.length-1) all[i+1].focus();
  });
});

// ── HEADER ─────────────────────────────────────────────────
function updateHdr(){
  const r=rec[0];
  document.getElementById('hdr-info').innerHTML=r
    ?`最新：第 ${r.p} 期<br>${r.n.map(f2).join(' ')}`
    :'尚無紀錄';
}

// ── INIT ───────────────────────────────────────────────────
load();
updateHdr();
render();
</script>
