<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港六合彩 分析</title>
<style>
:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --primary: #16a34a;
  --primary-dk: #15803d;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
  --z1: #2563eb; --z1-bg: #dbeafe;
  --z2: #16a34a; --z2-bg: #dcfce7;
  --z3: #ea580c; --z3-bg: #ffedd5;
  --z4: #dc2626; --z4-bg: #fee2e2;
  --od: #9333ea; --od-bg: #f3e8ff;
  --warn: #d97706; --warn-bg: #fef3c7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
header { background: var(--primary); color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 1.1rem; font-weight: 700; }
#hdr-info { font-size: .78rem; opacity: .85; text-align: right; line-height: 1.5; }

/* Input */
.input-card { background: var(--card); margin: 12px; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.input-card h2 { font-size: .82rem; font-weight: 600; color: var(--muted); margin-bottom: 10px; }
.input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
input[type=number] { border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 6px; font-size: .95rem; text-align: center; width: 60px; outline: none; -moz-appearance: textfield; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number]:focus { border-color: var(--primary); }
#inp-period { width: 80px; }
.num-wrap { display: flex; gap: 5px; }
.btn { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-size: .88rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background .15s; }
.btn:hover { background: var(--primary-dk); }
.btn-gray { background: #94a3b8; }
.btn-gray:hover { background: #64748b; }
.btn-red { background: #dc2626; }
.btn-red:hover { background: #b91c1c; }

/* Tabs */
.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; padding: 0 12px; }
.tab-btn { border: none; background: none; padding: 11px 14px; font-size: .83rem; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2.5px solid transparent; white-space: nowrap; transition: all .15s; }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

/* Content */
#content { padding: 12px; max-width: 760px; margin: 0 auto; }

/* Card */
.card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.card h3 { font-size: .93rem; font-weight: 700; margin-bottom: 12px; }
.sec-lbl { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }

/* Balls */
.ball { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; font-size: .82rem; font-weight: 700; margin: 2px; flex-shrink: 0; }
.ball-sm { width: 26px; height: 26px; font-size: .72rem; margin: 1px; }
.z1 { background: var(--z1-bg); color: var(--z1); }
.z2 { background: var(--z2-bg); color: var(--z2); }
.z3 { background: var(--z3-bg); color: var(--z3); }
.z4 { background: var(--z4-bg); color: var(--z4); }
.zx { background: #f1f5f9; color: #94a3b8; }

/* Tags */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: .72rem; font-weight: 600; }
.tag-hot { background: #fee2e2; color: #dc2626; }
.tag-cold { background: #dbeafe; color: #2563eb; }
.tag-od { background: var(--od-bg); color: var(--od); }
.tag-warn { background: var(--warn-bg); color: var(--warn); }
.tag-ok { background: #dcfce7; color: #16a34a; }
.tag-gray { background: #f1f5f9; color: var(--muted); }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: .83rem; }
th { text-align: left; padding: 7px 8px; color: var(--muted); font-weight: 600; border-bottom: 1.5px solid var(--border); font-size: .75rem; }
td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }

/* Alerts */
.alert { border-radius: 8px; padding: 10px 12px; font-size: .83rem; margin-bottom: 8px; line-height: 1.6; }
.alert-danger { background: #fee2e2; color: #991b1b; }
.alert-warn { background: var(--warn-bg); color: #92400e; }
.alert-od { background: var(--od-bg); color: #6b21a8; }
.alert-ok { background: #dcfce7; color: #166534; }
.alert-blue { background: #dbeafe; color: #1e40af; }

/* Group cards */
.grp { border: 1.5px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.grp-title { font-size: .9rem; font-weight: 700; margin-bottom: 10px; }
.grp-nums { display: flex; gap: 2px; flex-wrap: wrap; margin-bottom: 8px; }
.grp-meta { font-size: .79rem; color: var(--muted); line-height: 1.7; }
.verify-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }

/* Stats */
.zone-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.zone-box { border-radius: 8px; padding: 10px 8px; text-align: center; }
.zone-box .val { font-size: 1.4rem; font-weight: 700; }
.zone-box .lbl { font-size: .7rem; color: var(--muted); margin-top: 2px; }

/* Tail grid */
.tail-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; }
.tail-cell { border-radius: 8px; padding: 8px 4px; text-align: center; background: var(--bg); }
.tail-cell .tv { font-size: 1.1rem; font-weight: 700; }
.tail-cell .tl { font-size: .68rem; color: var(--muted); margin-top: 2px; }
.bar-wrap { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 5px; }
.bar-fill { height: 100%; border-radius: 3px; }

/* Num row */
.num-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.num-row:last-child { border-bottom: none; }

/* OD bar */
.od-bar { flex: 1; }
.od-label { min-width: 44px; text-align: right; font-size: .8rem; font-weight: 700; }

/* Empty */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: .88rem; }

/* Settings textarea */
textarea { width: 100%; height: 180px; font-family: monospace; font-size: .78rem; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px; resize: vertical; outline: none; }
textarea:focus { border-color: var(--primary); }

@media (max-width: 480px) {
  .zone-grid { grid-template-columns: repeat(2,1fr); }
  .input-row { flex-direction: column; align-items: flex-start; }
}
</style>
</head>

// 24/042–26/067，共300期
function buildAnnual(records) {
  const T = records.length;
  if (!T) return null;
  const firstP = records[T-1].p, lastP = records[0].p;
  const freq = new Array(50).fill(0);
  const zoneCnt = {1:0,2:0,3:0,4:0};
  const tailCnt = new Array(10).fill(0);
  let consecCount = 0, sumTotal = 0;
  const patCnt = {};
  records.forEach(r => {
    r.n.forEach(n => { freq[n]++; zoneCnt[Z(n)]++; tailCnt[n%10]++; });
    const s = [...r.n].sort((a,b)=>a-b);
    for (let i=0;i<s.length-1;i++) if(s[i+1]===s[i]+1){consecCount++;break;}
    sumTotal += r.n.reduce((a,b)=>a+b,0);
    const zp=[0,0,0,0]; r.n.forEach(n=>zp[Z(n)-1]++);
    const pat=zp.join('-'); patCnt[pat]=(patCnt[pat]||0)+1;
  });
  const totalBalls=T*6;
  const zonePct={};[1,2,3,4].forEach(z=>{ zonePct[z]=+((zoneCnt[z]/totalBalls*100).toFixed(1)); });
  const tailBias={};
  for(let t=0;t<=9;t++){const exp=t===0?T*6*4/49:T*6*5/49;tailBias[t]=+((tailCnt[t]/exp-1)*100).toFixed(1);}
  const consecRate=+((consecCount/T*100).toFixed(1));
  const avgSum=+((sumTotal/T).toFixed(1));
  const hotNum=Array.from({length:49},(_,i)=>i+1).reduce((a,b)=>freq[a]>=freq[b]?a:b);
  const topPats=Object.entries(patCnt).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const annMax=Math.max(...freq.slice(1));
  const tailBiasMax=Math.max(1,...Object.values(tailBias).filter(v=>v>0));
  return {periods:T,firstP,lastP,freq,tailBias,zonePct,consecRate,avgSum,hotNum,topPats,annMax,tailBiasMax};
}

// conStat[num] = {total, repeats, followedBy:{m:count,...}}
//   total      = times num appeared as "previous draw" predecessor
//   repeats    = times num also appeared in the very next draw (連莊)
//   followedBy = for each number m, how many times m appeared in the next draw after num

function buildConStat(records) {
  const s = {};
  const ordered = [...records].reverse(); // chronological
  for (let i = 0; i < ordered.length - 1; i++) {
    const prev = ordered[i].n, curr = ordered[i+1].n;
    prev.forEach(n => {
      if (!s[n]) s[n] = {total:0, repeats:0, followedBy:{}};
      s[n].total++;
      if (curr.includes(n)) s[n].repeats++;
      curr.forEach(m => { s[n].followedBy[m] = (s[n].followedBy[m]||0)+1; });
    });
  }
  return s;
}

function buildPairStat() {
  const pairs = {};
  rec.forEach(r => {
    const sorted = [...r.n].sort((a,b)=>a-b);
    for(let i=0;i<sorted.length-1;i++)
      for(let j=i+1;j<sorted.length;j++) {
        const k = `${sorted[i]}-${sorted[j]}`;
        pairs[k] = (pairs[k]||0)+1;
      }
  });
  return pairs;
}

function reconstructLastReport() {
  if (!rec[0]) return;

      abBefore = i;
    }
    return {n, abBefore, ratio: +(abBefore / (st[n]?.ag || 1)).toFixed(2)};
  });
  const zd = {1:0,2:0,3:0,4:0};
  sorted.forEach(n => {zd[Z(n)]++;});

}

// ── GROUP GENERATION ───────────────────────────────────────
// 共用：年度熱度分（頻率×70% + 尾偏×30%）
const _annMax = () => ANNUAL.annMax;
function annScore(n) {
  return (ANNUAL.freq[n]/ANNUAL.annMax)*70 + Math.max(0, ANNUAL.tailBias[n%10]||0)/ANNUAL.tailBiasMax*30;
}

// 共用：建立近30期動能數據
function buildMom() {
  const rN = Math.min(30, rec.length);
  const rf = new Array(50).fill(0);
  rec.slice(0, rN).forEach(r => r.n.forEach(n => rf[n]++));
  const annPer = ANNUAL.periods;
  const momFn = n => { const e = ANNUAL.freq[n]/annPer; return e<0.001?0:(rf[n]/rN)/e; };
  return {rN, rf, momFn};
}

// 共用：雙信號評分函數（年度×60% + 動能×40%）
function buildDual(cand) {
  const {momFn} = buildMom();
  const s3max = Math.max(...cand.map(annScore), 0.01);
  const momMax = Math.max(...cand.map(momFn), 0.01);
  const dualFn = n => (annScore(n)/s3max)*60 + (momFn(n)/momMax)*40;
  return {dualFn, momFn};
}

// 保留舊的 cs/byCS 供 G4 警告標注用（不再影響選號）
function cs(n) {
  if(!st[n]) return 0; const s=st[n];
  return (s.ab/s.ag)*0.6 + (s.ab/s.mg)*3*0.4;
}
const byCS = arr => [...arr].sort((a,b)=>cs(b)-cs(a));

// G1: 年度熱號流 — 純年度頻率+尾偏，取前5（回測效力1.75×）
function genG1(cand) {
  const sorted = [...cand].sort((a,b) => annScore(b)-annScore(a));
  const nums = sorted.slice(0,6).sort((a,b)=>a-b);
  return {nums, sorted};
}

// G2: 近期動能流 — 純近30期升溫比，取前5（回測效力1.46×）
function genG2(cand) {
  const {momFn} = buildMom();
  const sorted = [...cand].sort((a,b) => momFn(b)-momFn(a));
  const nums = sorted.slice(0,6).sort((a,b)=>a-b);
  return {nums, momFn, sorted};
}

// G3: 均衡區間流 — 三區覆蓋（一/二/三區各取最強），含連號後處理
function genG3(cand) {
  const {dualFn} = buildDual(cand);
  const byZ = {};
  for(let z=1;z<=4;z++) byZ[z] = [...cand.filter(n=>Z(n)===z)].sort((a,b)=>dualFn(b)-dualFn(a));
  let pool = [...byZ[1].slice(0,2), ...byZ[2].slice(0,2), ...byZ[3].slice(0,2), ...byZ[4].slice(0,2)];
  if(pool.length < 6) pool = [...pool, ...byZ[4]].filter((n,i,a)=>a.indexOf(n)===i);
  pool.sort((a,b)=>dualFn(b)-dualFn(a));
  const nums = ensureConsec(pool.slice(0,6).sort((a,b)=>a-b), cand, dualFn);
  return {nums, dualFn};
}

// G4: 冷轉熱流 — 年度頻率偏低（≤期望值×90%）但近30期升溫，捕捉反轉信號
function genG4(cand) {
  const {momFn} = buildMom();
  const coldThresh = Math.floor(ANNUAL.periods * 6/49 * 0.9);
  let picks = cand.filter(n => ANNUAL.freq[n] <= coldThresh && momFn(n) >= 1.1)
    .sort((a,b) => momFn(b)-momFn(a));
  if(picks.length < 6) {
    const extra = cand.filter(n => momFn(n) >= 1.0 && !picks.includes(n))
      .sort((a,b) => momFn(b)-momFn(a));
    picks = [...picks, ...extra];
  }
  if(picks.length < 6) picks = [...cand].sort((a,b)=>momFn(b)-momFn(a));
  return {nums: picks.slice(0,6).sort((a,b)=>a-b), momFn};
}

// G5: 熱尾優先流 — 動態從 ANNUAL.tailBias 找偏熱/偏冷尾，強制從熱尾選3+碼
function genG5(cand) {
  const {dualFn} = buildDual(cand);
  const hotTails = Object.entries(ANNUAL.tailBias).filter(([,b])=>+b>=8).map(([t])=>+t);
  const coldTails = Object.entries(ANNUAL.tailBias).filter(([,b])=>+b<=-8).map(([t])=>+t);
  const effectiveHot = hotTails.length ? hotTails : [1,5,6,8];
  const hotPool = [...cand.filter(n=>effectiveHot.includes(n%10))].sort((a,b)=>dualFn(b)-dualFn(a));
  const coldPool = [...cand.filter(n=>!effectiveHot.includes(n%10))].sort((a,b)=>dualFn(b)-dualFn(a));
  const hotPicks = hotPool.slice(0, Math.min(5, hotPool.length));
  const rest = coldPool.filter(n=>!hotPicks.includes(n)).slice(0, 6-hotPicks.length);
  const picks = [...hotPicks, ...rest].slice(0,6);
  const highTailCnt = picks.filter(n=>effectiveHot.includes(n%10)).length;
  const coldTailCnt = picks.filter(n=>coldTails.includes(n%10)).length;
  return {nums: picks.sort((a,b)=>a-b), highTailCnt, coldTailCnt, dualFn, hotTails: effectiveHot, coldTails};
}

// G8: 雙信號複合流（年度熱度×60% + 近期動能×40%）— 回測：1.66×隨機（已剔除無效逾期信號）
function genG8(cand) {
  const rN = Math.min(30, rec.length);
  const recentFreq = new Array(50).fill(0);
  rec.slice(0, rN).forEach(r => r.n.forEach(n => recentFreq[n]++));
  const annPer = ANNUAL.periods;
  const momFn = n => { const e = ANNUAL.freq[n]/annPer; return e<0.001?0:(recentFreq[n]/rN)/e; };
  const s3fn = n => (ANNUAL.freq[n]/ANNUAL.annMax)*70 + Math.max(0, ANNUAL.tailBias[n%10]||0)/ANNUAL.tailBiasMax*30;
  const s3max = Math.max(...cand.map(s3fn), 0.01);
  const momMax = Math.max(...cand.map(momFn), 0.01);
  const dualFn = n => (s3fn(n)/s3max)*60 + (momFn(n)/momMax)*40;
  const top5raw = [...cand].sort((a,b) => dualFn(b) - dualFn(a)).slice(0, 6);
  if(top5raw.length < 6) return null;
  const top5 = ensureConsec(top5raw.sort((a,b)=>a-b), cand, dualFn);
  const nums = top5.sort((a,b) => a-b);
  const momSorted = [...top5].sort((a,b) => momFn(b) - momFn(a));
  const momPicks = momSorted.slice(0, 2);
  const annPicks = top5.filter(n => !momPicks.includes(n));
  return {nums, momPicks, annPicks, momFn, recentFreq, rN};
}

// G6: 年度規律流（年度最熱號強制入選 + 年度頻率×60% + 尾數偏移×40%）
function genG6(cand) {
  const {momFn} = buildMom();
  const momMax = Math.max(...cand.map(momFn), 0.01);
  const must=cand.includes(ANNUAL.hotNum)?[ANNUAL.hotNum]:[];
  const pool=cand.filter(n=>!must.includes(n));
  const scored=pool.map(n=>({
    n,
    score: annScore(n)*0.6 + (momFn(n)/momMax)*100*0.4
  })).sort((a,b)=>b.score-a.score);
  const picks=[...must,...scored.slice(0,6-must.length).map(x=>x.n)];
  return {nums:picks.sort((a,b)=>a-b), forcedHot:must.length>0, hotAnchor:ANNUAL.hotNum, momFn};
}

// 連號後處理：若選號無連號且歷史連號率>50%，嘗試替換最低分號換入鄰號
function ensureConsec(nums, cand, scoreFn) {
  if(ANNUAL.consecRate < 50) return nums;
  const hasConsec = nums.some(n=>nums.includes(n+1));
  if(hasConsec) return nums;
  const byScore = [...nums].sort((a,b)=>scoreFn(a)-scoreFn(b));
  for(const toOut of byScore) {
    const others = nums.filter(n=>n!==toOut);
    const adj = others.flatMap(n=>[n-1,n+1])
      .filter(n=>n>=1&&n<=49&&!nums.includes(n)&&cand.includes(n));
    if(adj.length) {
      adj.sort((a,b)=>scoreFn(b)-scoreFn(a));
      return [...others, adj[0]].sort((a,b)=>a-b);
    }
  }
  return nums;
}

function allGroups() {
  const cand=candidates();
  return {cand, g1:genG1(cand), g2:genG2(cand), g3:genG3(cand), g4:genG4(cand), g5:genG5(cand), g6:genG6(cand), g8:genG8(cand)};
}

function calcExcludeZone() {
  const POOL=49, EXCL=15;
  const all=Array.from({length:POOL},(_,i)=>i+1);
  const f5=new Array(POOL+1).fill(0), f10=new Array(POOL+1).fill(0), f20=new Array(POOL+1).fill(0);
  rec.slice(0,Math.min(5, rec.length)).forEach(r=>r.n.forEach(n=>f5[n]++));
  rec.slice(0,Math.min(10,rec.length)).forEach(r=>r.n.forEach(n=>f10[n]++));
  rec.slice(0,Math.min(20,rec.length)).forEach(r=>r.n.forEach(n=>f20[n]++));
  const score=n=>f5[n]*3.0+f10[n]*1.5+f20[n]*0.8;
  const exclude=[...all].sort((a,b)=>score(b)-score(a)).slice(0,EXCL);
  const BT=Math.min(30,rec.length-21);
  let outside=0,total=0;
  for(let i=0;i<BT;i++){
    const b5=new Array(POOL+1).fill(0),b10=new Array(POOL+1).fill(0),b20=new Array(POOL+1).fill(0);
    rec.slice(i+1,i+1+Math.min(5, rec.length-i-1)).forEach(r=>r.n.forEach(n=>b5[n]++));
    rec.slice(i+1,i+1+Math.min(10,rec.length-i-1)).forEach(r=>r.n.forEach(n=>b10[n]++));
    rec.slice(i+1,i+1+Math.min(20,rec.length-i-1)).forEach(r=>r.n.forEach(n=>b20[n]++));
    const sc=n=>b5[n]*3.0+b10[n]*1.5+b20[n]*0.8;
    const ex=[...all].sort((a,b)=>sc(b)-sc(a)).slice(0,EXCL);
    rec[i].n.forEach(n=>{if(!ex.includes(n))outside++;total++;});
  }
  const btAvoid=BT>0?(outside/total*100).toFixed(1):null;
  const theorAvoid=((POOL-EXCL)/POOL*100).toFixed(1);
  return{exclude,score,btAvoid,theorAvoid,BT};
}

// 雙信號合成預測：S3年度熱度(60%) + S4近期動能(40%)
// 回測驗證：逾期壓力~1.09×（無效）已完全剔除；動能×年度雙信號達1.66×隨機
function predictNextDraw() {
  if(!rec[0]) return [];
  const last = rec[0].n;
  const allNums = Array.from({length:49},(_,i)=>i+1).filter(n=>!excl(n));

  // S3：年度熱度（頻率×70% + 尾偏×30%，分母動態）
  const s3fn = n => (ANNUAL.freq[n]/ANNUAL.annMax)*70 + Math.max(0, ANNUAL.tailBias[n%10]||0)/ANNUAL.tailBiasMax*30;
  const s3max = Math.max(...allNums.map(s3fn), 0.01);

  // S4：近期動能（近30期出現率 / 年度平均出現率）
  const rN = Math.min(30, rec.length);
  const recentFreq = new Array(50).fill(0);
  rec.slice(0, rN).forEach(r => r.n.forEach(n => recentFreq[n]++));
  const annPer = ANNUAL.periods;
  const s4fn = n => { const e = ANNUAL.freq[n]/annPer; return e<0.001?0:(recentFreq[n]/rN)/e; };
  const s4max = Math.max(...allNums.map(s4fn), 0.01);

  // S5：同伴加持（兩輪：先用 S3+S4 取前15，再算同伴分）
  const prelim = allNums.map(n=>({n, sc: s3fn(n)/s3max*60 + s4fn(n)/s4max*40}))
    .sort((a,b)=>b.sc-a.sc);
  const friendPool = prelim.slice(0,15).map(x=>x.n);
  const pairs = buildPairStat();
  const pairFn = n => {
    let s=0; friendPool.forEach(m=>{ if(m===n) return;
      const k=[n,m].sort((a,b)=>a-b).join('-'); s+=(pairs[k]||0); }); return s;
  };
  const pairMax = Math.max(...allNums.map(pairFn), 1);

  return allNums.map(n => {
    const n3 = s3fn(n)/s3max, n4 = s4fn(n)/s4max;
    const n5 = pairFn(n)/pairMax;
    const combined = +(n3*55 + n4*35 + n5*10).toFixed(1);
    const s3p=+(n3*100).toFixed(0), s4p=+(n4*100).toFixed(0);
    const momRatio = +(s4fn(n)).toFixed(2);
    return {
      n, combined, s3p, s4p, momRatio,
      sigCount: (s3p>=65?1:0)+(s4p>=65?1:0),
      isLast: last.includes(n),
      isOD: od(n)>=1.0,
      isSuperOD: od(n)>=2.0,
      isAlert9: st[n]?.ab===9,
    };
  }).sort((a,b)=>b.combined-a.combined);
}

const sortState = {};
function setSort(tid, col) {
  const s = sortState[tid];
  sortState[tid] = (s && s.col === col)
    ? {col, dir: s.dir === 'asc' ? 'desc' : 'asc'}
    : {col, dir: 'desc'};
}
function thSort(tid, col, label) {
  const s = sortState[tid];
  const active = s && s.col === col;
  const arr = active ? (s.dir === 'asc' ? '▲' : '▼') : '↕';
  return `<th onclick="setSort('${tid}','${col}');render()" style="cursor:pointer;user-select:none;white-space:nowrap">${label} <span style="font-size:.65em;color:${active?'#4ade80':'#64748b'}">${arr}</span></th>`;
}
function applySort(arr, tid, defCol, defDir) {
  const s = sortState[tid] || (defCol ? {col:defCol, dir:defDir||'desc'} : null);
  if (!s) return arr;
  return [...arr].sort((a, b) => {
    const va = a[s.col], vb = b[s.col];
    const cmp = typeof va === 'string' ? va.localeCompare(vb, 'zh-TW') : (va??0) - (vb??0);
    return s.dir === 'asc' ? cmp : -cmp;
  });
}

function observation(R,w9,sOD){
  const lines=[];
  const zd=R.zoneDist;
  const zero=[1,2,3,4].filter(z=>zd[z]===0);
  if(zero.length) lines.push(`本期 ${zero.map(z=>ZL[z]).join('、')} 開出0碼，斷區走勢是否延續值得觀察。`);
  const maxZ=[1,2,3,4].reduce((a,b)=>zd[a]>zd[b]?a:b);
  if(zd[maxZ]>=3) lines.push(`${ZL[maxZ]} 本期強勢開出 ${zd[maxZ]} 碼，注意是否延續。`);
  if(w9.length) lines.push(`${w9.map(f2).join('、')} 號已沉寂9期，下期若未開即列排除。`);
  if(sOD.length) lines.push(`超期候選：${sOD.slice(0,3).map(n=>`${f2(n)}（×${od(n)}倍）`).join('、')} 回歸壓力持續。`);
  if(!lines.length) lines.push('本期走勢平穩，無特殊異常，可參考選號分析。');
  return lines.join('<br>');
}

// ── RENDER: ANNUAL ─────────────────────────────────────────
function renderAnnual(el){
  const A=ANNUAL, T=A.periods;
  const freq=A.freq;
  const firstP=A.firstP, lastP=A.lastP;
  const maxF=Math.max(...freq.slice(1));
  const expF=+(T*6/49).toFixed(1);

  // sorted ranking
  const ranking=Array.from({length:49},(_,i)=>i+1).sort((a,b)=>freq[b]-freq[a]);

  // tail bias sorted
  const tailSorted=Object.entries(A.tailBias).sort((a,b)=>b[1]-a[1]);

  // color helpers
  const freqClr=f=>f>=25?'#dc2626':f>=20?'#d97706':f<=13?'#2563eb':f<=16?'#64748b':'var(--text)';
  const biasClr=b=>b>=15?'#dc2626':b>=8?'#d97706':b<=-15?'#2563eb':b<=-8?'#64748b':'var(--text)';
  const biasBg=b=>b>=15?'#fee2e2':b>=8?'#fef3c7':b<=-15?'#dbeafe':b<=-8?'#e0e7ff':'';

  el.innerHTML=`
  <div class="card">
    <h3>📈 年度開獎規律（${firstP}–${lastP}，共${T}期）</h3>
    <div class="zone-grid" style="margin-bottom:12px">
      ${(()=>{const hotN=A.hotNum,hotF=freq[hotN];const coldTail=Object.entries(A.tailBias).reduce((a,b)=>+b[1]<+a[1]?b:a);return `
      <div class="zone-box" style="background:#fee2e2"><div class="val" style="color:#dc2626">${String(hotN).padStart(2,'0')}</div><div class="lbl">年度最熱號</div></div>
      <div class="zone-box" style="background:#fef3c7"><div class="val" style="color:#d97706">${A.consecRate}%</div><div class="lbl">每期含連號率</div></div>
      <div class="zone-box" style="background:#dcfce7"><div class="val" style="color:#16a34a">${A.avgSum}</div><div class="lbl">平均號碼總和</div></div>
      <div class="zone-box" style="background:#dbeafe"><div class="val" style="color:#2563eb">尾${coldTail[0]}</div><div class="lbl">最冷尾數(${coldTail[1]}%)</div></div>`;})()}
    </div>
    <div style="font-size:.78rem;color:var(--muted)">理論期望：每號每期出現機率 6/49 = 12.24%，${T}期理論出現次數 ≈ <strong>${expF}</strong> 次</div>
  </div>

  <div class="card">
    <h3>🔥 號碼年度熱冷排行（全49號）</h3>
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:10px">紅色=超頻熱號 / 藍色=欠頻冷號 / 理論值 ${expF} 次</div>
    ${ranking.map((n,i)=>{
      const f=freq[n], diff=f-expF, pct=+((f/expF-1)*100).toFixed(0);
      const barW=Math.min((f/maxF)*100,100);
      const clr=freqClr(f);
      return `<div class="num-row">
        <span style="color:var(--muted);width:20px;font-size:.75rem;text-align:right">${i+1}</span>
        ${ball(n,'ball-sm')}
        <div style="flex:1;margin:0 8px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
            <span style="font-size:.85rem;font-weight:700;color:${clr}">${f}次</span>
            <span style="font-size:.72rem;color:${clr}">${diff>=0?'+':''}${diff>=0?'+':''} ${pct>0?'+':''}${pct}%</span>
            ${f>=25?'<span class="tag tag-hot">熱</span>':f<=13?'<span class="tag tag-cold">冷</span>':''}
          </div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${barW}%;background:${clr}"></div></div>
        </div>
      </div>`;
    }).join('')}
  </div>

  <div class="card">
    <h3>🎯 尾數年度偏移（選號核心規律）</h3>
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:10px">尾0 因只有4個號碼（10,20,30,40），理論期望較低（${+(T*6*4/49).toFixed(1)}次 vs 其他尾數${+(T*6*5/49).toFixed(1)}次）</div>

function renderStats(el){

  rec.slice(5,10).forEach(r=>r.n.forEach(n=>{zc5p[Z(n)]++;}));

  const tc=tailCounts(10);
  const maxT=Math.max(...Object.values(tc));

  // Long-term tail analysis using t50/t100 accumulated data
  const tail50={}, tail100={};
  for(let t=0;t<=9;t++){tail50[t]=0;tail100[t]=0;}
  for(let n=1;n<=49;n++){
    if(st[n]){tail50[n%10]+=st[n].t50;tail100[n%10]+=st[n].t100;}
  }
  // Expected: tail0 has 4 nums (10,20,30,40), tails 1-9 have 5 nums each
  const exp50 = t => t===0?+(50*6*4/49).toFixed(1):+(50*6*5/49).toFixed(1);
  const exp100 = t => t===0?+(100*6*4/49).toFixed(1):+(100*6*5/49).toFixed(1);
  const tailBias50 = t => +((tail50[t]/exp50(t)-1)*100).toFixed(1);
  const tailsSorted50 = Array.from({length:10},(_,i)=>i).sort((a,b)=>tailBias50(b)-tailBias50(a));

  const topOD=candidates().sort((a,b)=>od(b)-od(a)).slice(0,10);

  // Return history stats
  function retStats(n) {
    const h = retHist[n];
    if (!h || h.length === 0) return null;
    const gaps = h.map(x=>x.gap);
    const avg = (gaps.reduce((a,b)=>a+b,0)/gaps.length).toFixed(1);
    return { count: h.length, avg, min: Math.min(...gaps), max: Math.max(...gaps), last: h[h.length-1] };
  }

  // Numbers with any return history, sorted by count desc
  const numsWithHist = Array.from({length:49},(_,i)=>i+1)
    .filter(n => retHist[n] && retHist[n].length > 0)
    .sort((a,b) => (retHist[b]?.length||0) - (retHist[a]?.length||0));

  el.innerHTML=`

        const r5=zc5r[z],p5=zc5p[z];

        return `<tr><td><span style="color:var(--z${z});font-weight:600">${ZN[z]}</span></td>
          <td>${p5}</td><td style="font-weight:600">${r5}</td><td>${zc10[z]}</td><td>${tr}</td></tr>`;
      }).join('')}</tbody>
    </table>
  </div>

  <div class="card">
    <h3>📉 長期尾數偏移分析（選號核心規律）</h3>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:10px">依50期偏移排序。此規律在50期、100期均高度穩定，為尾數優先流的理論依據。</p>
    <table>
      <thead><tr>${thSort('st-tail','t','尾數')}${thSort('st-tail','act50','50期實際')}<th>50期理論</th>${thSort('st-tail','b50','偏移')}${thSort('st-tail','b100','100期偏移')}<th>號碼</th></tr></thead>
      <tbody>${applySort(Array.from({length:10},(_,i)=>({t:i,act50:tail50[i],b50:tailBias50(i),b100:+((tail100[i]/exp100(i)-1)*100).toFixed(1)})),'st-tail','b50','desc').map(({t,act50,b50,b100})=>{
        const nums=Array.from({length:49},(_,i)=>i+1).filter(n=>n%10===t);
        const color=b50>=20?'#dc2626':b50<=-15?'#2563eb':b50>=10?'#d97706':'var(--text)';
        const bg=b50>=20?'#fee2e2':b50<=-15?'#dbeafe':'';
        return `<tr style="background:${bg}">
          <td><strong style="font-size:1rem;color:${color}">尾${t}</strong></td>
          <td style="text-align:center;font-weight:600;color:${color}">${act50}</td>
          <td style="text-align:center;color:var(--muted)">${exp50(t)}</td>
          <td style="text-align:center;font-weight:700;color:${color}">${b50>0?'+':''}${b50}%</td>
          <td style="text-align:center;color:${b100>=10?'#dc2626':b100<=-10?'#2563eb':'var(--muted)'}">${b100>0?'+':''}${b100}%</td>

// ── RENDER: TRACK ──────────────────────────────────────────
function backtestGroups() {
  const {g1,g2,g3,g4,g5,g6,g8} = allGroups();
  const pred = predictNextDraw();
  const g7 = pred.length>=6 ? {nums:pred.slice(0,6).map(x=>x.n)} : null;
  const grps = [
    {key:'G1', label:'📅年度熱號', g:g1},
    {key:'G2', label:'⚡近期動能', g:g2},
    {key:'G3', label:'⚖️均衡區間', g:g3},
    {key:'G4', label:'🌡️冷轉熱', g:g4},
    {key:'G5', label:'🎯熱尾優先', g:g5},
    {key:'G6', label:'🏆熱號錨+動能', g:g6},
    {key:'G7', label:'📡雙信號預測', g:g7},
    {key:'G8', label:'🎰年度+動能', g:g8},
  ];
  const draws = rec.slice(0, rec.length);
  return grps.map(({key,label,g}) => {
    if(!g) return {key, label, valid:false};
    const mc = draws.map(r => g.nums.filter(n => r.n.includes(n)).length);
    const total = mc.length;
    const avg = total ? +(mc.reduce((a,b)=>a+b,0)/total).toFixed(2) : 0;
    const randExp = +(6*6/49).toFixed(2);
    const hit1cnt = mc.filter(m=>m>=1).length;
    return {key, label, nums:g.nums, avg, randExp,
      hit3: mc.filter(m=>m>=3).length, hit2: mc.filter(m=>m>=2).length,
      hit1: hit1cnt, winRate: total ? +(hit1cnt/total*100).toFixed(0) : 0,
      maxM: total?Math.max(...mc):0, total, valid:true};
  });
}

function renderTrack(el) {
  const bt = backtestGroups();
  const validBt = bt.filter(g=>g.valid);
  const N = validBt[0]?.total || 0;

  // per-group log averages
  const gKeys = ['G1','G2','G3','G4','G5','G6','G7','G8'];
  const gNames = {G1:'📅年度熱號',G2:'⚡近期動能',G3:'⚖️均衡區間',G4:'🌡️冷轉熱',G5:'🎯熱尾優先',G6:'🏆熱號錨+動能',G7:'📡雙信號預測',G8:'🎰年度+動能'};
  const logAvg = {};
  gKeys.forEach(k => {
    const rel = pickLog.filter(l => l.hits && l.hits[k] !== undefined);
    if(rel.length) logAvg[k] = +(rel.reduce((a,l)=>a+l.hits[k],0)/rel.length).toFixed(2);
  });

  // suggestions
  const sugg = [];
  const hasPL = pickLog.length >= 2;
  const bestBt = validBt.length ? validBt.reduce((a,b)=>b.avg>a.avg?b:a) : null;
  if(hasPL) {
    const logEntries = Object.entries(logAvg).sort((a,b)=>b[1]-a[1]);
    if(logEntries.length && logEntries[0][1] >= 1.0)
      sugg.push(`🏆 根據<strong>實際押注紀錄</strong>，<strong>${gNames[logEntries[0][0]]}</strong> 平均命中 <strong>${logEntries[0][1]}</strong> 碼，是目前績效最佳策略，建議優先使用。`);
    const worstPL = logEntries[logEntries.length-1];
    if(worstPL && logEntries[0][1]-worstPL[1] >= 0.5 && pickLog.length >= 3)
      sugg.push(`⚠️ <strong>${gNames[worstPL[0]]}</strong> 近期表現偏低（平均 ${worstPL[1]} 碼），建議減少押注此策略。`);
    if(logEntries.every(([,v])=>v < 0.4))
      sugg.push(`🔍 所有策略命中率均偏低，建議確認號碼統計表資料為最新（使用「⚙️ 設定」更新），或縮短分析期數。`);
  }
  if(!hasPL) {
    if(bestBt && bestBt.avg >= 1.3)
      sugg.push(`📊 回測顯示 <strong>${bestBt.label}</strong> 的選號類型在近 ${N} 期平均命中 <strong>${bestBt.avg}</strong> 碼，相對表現最佳。`);
    sugg.push(`💡 <strong>開始追蹤</strong>：在「🎯 選號」頁鎖定本期預測，輸入開獎結果後將自動累積命中統計，持續 3 期以上才能給出可靠修正建議。`);
  }
  const g6bt = bt.find(g=>g.key==='G6');
  if(g6bt?.valid && g6bt.avg >= 1.0 && !hasPL)
    sugg.push(`📈 年度規律流（含08熱號）回測表現穩定，2026年度統計效應仍有效。`);

  // pending pick HTML
  const pendHTML = pendingPick ?
    `<div class="alert alert-ok">
      ✅ <strong>已鎖定，等待下期開獎！</strong>
      <div style="margin-top:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
        ${Object.entries(pendingPick.strategies).map(([k,nums])=>
          `<div style="background:#fff;border-radius:6px;padding:6px;font-size:.76rem">
            <div style="font-weight:700;color:var(--primary);margin-bottom:3px">${gNames[k]}</div>
            <div>${nums.map(f2).join(', ')}</div>
          </div>`
        ).join('')}
      </div>
      <button onclick="pendingPick=null;savePickLog();render()" class="btn btn-gray" style="margin-top:10px;font-size:.75rem;padding:5px 12px">取消鎖定</button>
    </div>` :
    `<div style="color:var(--muted);font-size:.83rem;padding:8px 0">尚未鎖定本期預測。前往「🎯 選號」頁點擊「🔒 鎖定本期全部6組預測」，輸入下期開獎後自動記錄命中。</div>`;

  // pick log HTML
  const logHTML = pickLog.length === 0 ?
    `<div style="color:var(--muted);font-size:.83rem;text-align:center;padding:20px">尚無紀錄。<br>在選號頁鎖定預測並輸入開獎號碼後，命中結果將在此顯示。</div>` :
    `<div style="overflow-x:auto">
    <table>
      <thead><tr><th>期號</th><th>開獎號碼</th><th>G1</th><th>G2</th><th>G3</th><th>G4</th><th>G5</th><th>G6</th><th>G7雙信號</th><th>G8動能</th><th>最佳</th></tr></thead>
      <tbody>${pickLog.map(l => {
        const maxH = l.hits ? Math.max(...Object.values(l.hits), 0) : 0;
        const bestG = l.hits ? (Object.entries(l.hits).sort((a,b)=>b[1]-a[1])[0]||[])[0] : '';
        return `<tr>
          <td style="font-size:.76rem;color:var(--muted)">${l.period}</td>
          <td style="font-size:.72rem">${l.result.map(f2).join(' ')}</td>
          ${gKeys.map(k => {
            const h = l.hits?.[k];
            if(h === undefined) return `<td style="color:var(--muted);text-align:center">—</td>`;
            const clr = h>=3?'#dc2626':h>=2?'#d97706':h>=1?'#16a34a':'#94a3b8';
            return `<td style="text-align:center;font-weight:700;color:${clr}">${h}</td>`;
          }).join('')}
          <td style="text-align:center"><span class="tag ${maxH>=3?'tag-hot':maxH>=2?'tag-warn':'tag-gray'}">${bestG||'—'} ${maxH}碼</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
    <div style="margin-top:8px;display:flex;gap:12px;flex-wrap:wrap;font-size:.78rem;color:var(--muted)">
      ${gKeys.filter(k=>logAvg[k]!==undefined).map(k=>
        `<span>${gNames[k].slice(0,4)}平均：<strong style="color:${logAvg[k]>=1.0?'#16a34a':logAvg[k]>=0.5?'#d97706':'#94a3b8'}">${logAvg[k]}</strong>碼</span>`
      ).join('')}
    </div>
    <button onclick="if(confirm('確認清空全部押注紀錄？'))pickLog=[];savePickLog();render();" class="btn btn-red" style="margin-top:10px;font-size:.75rem;padding:5px 12px">清空紀錄</button>`;

  el.innerHTML = `
  <div class="card">
    <h3>🔒 本期預測狀態</h3>
    ${pendHTML}
  </div>

  <div class="card" style="background:linear-gradient(135deg,#f0fdf4,#fffbeb)">
    <h3>💡 策略修正建議</h3>
    ${sugg.map(s=>`<div style="font-size:.84rem;line-height:1.85;padding:5px 0;border-bottom:1px solid var(--border)">${s}</div>`).join('')}
  </div>

  <div class="card">
    <h3>📊 策略近期回測（當前選號 vs 近 ${N} 期開獎）</h3>
    <div class="alert alert-blue" style="font-size:.76rem;margin-bottom:10px">
      ⓘ 說明：以「當前狀態」生成的選號與全部 ${N} 期歷史開獎比對。數字越多代表策略在歷史上命中率越高。G4因選超期號天生偏低，請以實際押注紀錄為準。
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>策略</th><th>本期選號</th>${thSort('trk-bt','avg','平均命中')}${thSort('trk-bt','winRate','勝率%')}${thSort('trk-bt','hit2','2碼+')}${thSort('trk-bt','hit3','3碼+')}${thSort('trk-bt','maxM','最高')}<th>評估</th></tr></thead>
      <tbody>${applySort(bt,'trk-bt','avg','desc').map(g => {
        if(!g.valid) return `<tr><td colspan="9" style="color:var(--muted);font-size:.78rem">${g.label} — 候選號碼不足</td></tr>`;
        const grade = g.avg>=1.5?'優秀':g.avg>=1.0?'良好':g.avg>=0.6?'普通':'偏低';
        const clr = g.avg>=1.5?'#dc2626':g.avg>=1.0?'#d97706':g.avg>=0.6?'var(--muted)':'#2563eb';
        return `<tr>
          <td style="font-size:.78rem;font-weight:600">${g.label}</td>
          <td style="font-size:.68rem;color:var(--muted)">${g.nums.map(f2).join(' ')}</td>
          <td style="text-align:center;font-weight:700;color:${clr}">${g.avg}</td>
          <td style="text-align:center;font-size:.8rem;font-weight:600;color:${g.winRate>=60?'#16a34a':g.winRate>=45?'#d97706':'#94a3b8'}">${g.winRate}%</td>
          <td style="text-align:center;font-size:.8rem">${g.hit2}/${g.total}</td>
          <td style="text-align:center;font-size:.8rem">${g.hit3}/${g.total}</td>
          <td style="text-align:center">${g.maxM}</td>
          <td><span class="tag ${g.avg>=1.5?'tag-hot':g.avg>=1.0?'tag-warn':'tag-gray'}">${grade}</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
    <div style="font-size:.72rem;color:var(--muted);margin-top:8px">隨機基準：每6碼選號平均命中 ≈ 0.73碼 ｜ 理論勝率 ≈ 58%（6×6/49 至少1碼機率）</div>
  </div>

  <div class="card">
    <h3>🏆 歷史押注命中紀錄（${pickLog.length} 筆）</h3>
    ${logHTML}
  </div>`;
}

// ── RENDER: SETTINGS ───────────────────────────────────────
function renderSettings(el){
  el.innerHTML=`
  <div class="card">
    <h3>⚙️ 更新號碼統計表</h3>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:10px">每隔約50期手動更新各號碼的長期統計資料（最大間隔、平均間隔等）。<br>格式：每行「號碼 最大間隔 平均間隔 最多連續 最近未出現期數 出現總數 20期 50期 100期」</p>
    <textarea id="st-paste" placeholder="1 44 7.476 4 3 787 1 7 11&#10;2 46 7.766 4 8 757 5 12 19&#10;…"></textarea>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <button class="btn" onclick="applyStats()">套用更新</button>
      <button class="btn btn-red" onclick="resetAll()">重設所有資料</button>
    </div>
  </div>

  <div class="card">
    <h3>📊 目前各號碼狀態</h3>
    <table>
      <thead><tr>${thSort('cfg-st','n','號碼')}${thSort('cfg-st','ab','沉寂期')}${thSort('cfg-st','ag','平均間隔')}${thSort('cfg-st','mg','最大間隔')}${thSort('cfg-st','ratio','逾期倍數')}</tr></thead>
      <tbody>${applySort(Array.from({length:49},(_,i)=>i+1).map(n=>({n,ab:st[n].ab,ag:st[n].ag,mg:st[n].mg,ratio:od(n),ex:excl(n)})),'cfg-st','ab','desc').map(({n,ab,ag,mg,ratio,ex})=>{
        return `<tr style="${ex?'background:#fee2e2':''}">
          <td>${ex?ballX(n,'ball-sm'):ball(n,'ball-sm')}</td>
          <td>${ab}</td><td>${ag}</td><td>${mg}</td>
          <td style="color:${ex?'#dc2626':ratio>=2?'var(--od)':ratio>=1?'var(--warn)':'var(--muted)'};font-weight:${ratio>=1||ex?'700':'400'}">
            ${ex?'🚫排除':'×'+ratio}
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>`;
}

// ── RENDER: COMPANION ──────────────────────────────────────
function renderCompanion(el) {
  const pairs = buildPairStat();
  const total = rec.length;
  const randExp = +(total * 2 / (49 * 48 / 2) * C2_ADJ()).toFixed(1);

  function C2_ADJ() { return 6*5/2; } // 每期 C(6,2)=15 個 pair

  // 排行榜
  const topPairs = Object.entries(pairs)
    .map(([k,cnt]) => { const [a,b]=k.split('-').map(Number); return {a,b,cnt,pct:+(cnt/total*100).toFixed(1)}; })
    .sort((x,y)=>y.cnt-x.cnt).slice(0,20);

  // 單號查詢
  const companions = Array.from({length:49},(_,i)=>i+1)
    .filter(n=>n!==compNum)
    .map(n => {
      const k = compNum<n?`${compNum}-${n}`:`${n}-${compNum}`;
      return {n, cnt:pairs[k]||0, pct:+((pairs[k]||0)/total*100).toFixed(1)};
    }).sort((a,b)=>b.cnt-a.cnt);

  const maxCnt = topPairs[0]?.cnt || 1;
  const randLine = +(total*6*5/2/(49*48/2)).toFixed(1);

  el.innerHTML = `
  <div class="card">
    <h3>🤝 高頻同伴排行 TOP 20（共 ${total} 期）</h3>
    <div style="font-size:.78rem;color:var(--muted);margin-bottom:10px">同一期同時出現次數最多的號碼對，隨機期望 ≈ ${randLine} 次</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>#</th><th>號碼對</th><th style="text-align:center">共現次數</th><th style="text-align:center">頻率</th><th>相對強度</th></tr></thead>
      <tbody>${topPairs.map(({a,b,cnt,pct},i)=>`
        <tr>
          <td style="color:var(--muted);font-size:.75rem">${i+1}</td>
          <td>${ball(a,'ball-sm')} ${ball(b,'ball-sm')}</td>
          <td style="font-weight:700;text-align:center">${cnt}</td>
          <td style="text-align:center;color:var(--muted);font-size:.8rem">${pct}%</td>
          <td style="min-width:80px"><div class="bar-wrap"><div class="bar-fill" style="width:${cnt/maxCnt*100}%;background:var(--primary)"></div></div></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>

  <div class="card">
    <h3>🔍 單號同伴查詢</h3>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px">
      ${Array.from({length:49},(_,i)=>i+1).map(n=>`
        <span onclick="compNum=${n};renderCompanion(document.getElementById('content'))"
          class="ball ball-sm ${ZC[Z(n)]}"
          style="cursor:pointer;outline:${compNum===n?'2.5px solid #1e293b':'2px solid transparent'};outline-offset:1px">${f2(n)}</span>`).join('')}
    </div>
    <div style="font-size:.85rem;font-weight:700;margin-bottom:8px">
      ${ball(compNum,'ball-sm')} 號碼 ${f2(compNum)} 的同伴頻率（前 10 名）
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>同伴</th><th style="text-align:center">同期次數</th><th style="text-align:center">頻率</th><th>強度</th></tr></thead>
      <tbody>${companions.slice(0,10).map(({n,cnt,pct})=>`
        <tr>
          <td>${ball(n,'ball-sm')}</td>
          <td style="font-weight:700;text-align:center">${cnt}</td>
          <td style="text-align:center;font-size:.8rem;color:var(--muted)">${pct}%</td>
          <td style="min-width:80px"><div class="bar-wrap"><div class="bar-fill" style="width:${companions[0].cnt?cnt/companions[0].cnt*100:0}%;background:var(--z2)"></div></div></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
    <div style="font-size:.72rem;color:var(--muted);margin-top:8px">隨機期望 ≈ ${randLine} 次（${total} 期 × 理論同現機率）</div>
  </div>`;
}

function applyStats(){
  const raw=document.getElementById('st-paste').value.trim();
  if(!raw) return;
  let cnt=0;
  raw.split('\n').forEach(line=>{
    const p=line.trim().split(/\s+/).map(Number);
    if(p.length>=9){
      const [num,mg,ag,mc,ab,tt,t20,t50,t100]=p;
      if(num>=1&&num<=49){ st[num]={mg,ag,mc,ab,tt,t20,t50,t100}; cnt++; }
    }
  });
  save();
  alert(`已更新 ${cnt} 個號碼`);
  render();
}

function resetAll(){
  if(!confirm('確認重設全部資料回預設值？\n（含開獎紀錄、統計、押注紀錄）')) return;
  rec=JSON.parse(JSON.stringify(BASE_REC));
  st=JSON.parse(JSON.stringify(BASE_ST));
  retHist={};
  conStat=buildConStat(rec);
  pendingPick=null;
  pickLog=[];
  savePickLog();
  save();
  lastReport=null;
  updateHdr();
  alert(`✅ 已重設完成！\n${rec[0].draw||rec[0].p}（${rec[0].dt||""}），共 ${rec.length} 筆。\n押注紀錄已清空。`);
  go('pick');
}

// ── ADD DRAW ───────────────────────────────────────────────
function addDraw(){
  const pv=parseInt(document.getElementById('inp-period').value);
  const ni=[...document.querySelectorAll('.ni')];
  const nums=ni.map(i=>parseInt(i.value)).filter(n=>n>=1&&n<=49);

  if(!pv||pv<24000){ alert('請輸入有效期號（如 26067）'); return; }
  if(nums.length!==6){ alert('請輸入6個 01–49 的號碼'); return; }
  if(new Set(nums).size!==6){ alert('號碼不可重複'); return; }
  if(rec[0]&&pv<=rec[0].p){ alert(`期號需大於目前最新（${rec[0].p}）`); return; }

  const sorted=nums.sort((a,b)=>a-b);

  // snapshot pre-update stats for report
  const drawn=sorted.map(n=>({n,abBefore:st[n]?st[n].ab:0,ratio:od(n)}));
  const zd={1:0,2:0,3:0,4:0}; sorted.forEach(n=>{zd[Z(n)]++;});

  // record return history BEFORE updating absent counts
  sorted.forEach(n => {
    const gap = st[n] ? st[n].ab : 0;
    if (!retHist[n]) retHist[n] = [];
    retHist[n].push({period: pv, gap});
  });

  // record consecutive stat: prev draw → current draw
  const repeatNums = [];
  if (rec.length > 0) {
    const prev = rec[0].n;
    prev.forEach(n => {
      if (!conStat[n]) conStat[n] = {total:0, repeats:0, followedBy:{}};
      conStat[n].total++;
      if (sorted.includes(n)) { conStat[n].repeats++; repeatNums.push(n); }
      sorted.forEach(m => { conStat[n].followedBy[m] = (conStat[n].followedBy[m]||0)+1; });
    });
  }

  // update stats
  for(let n=1;n<=49;n++){
    if(!st[n]) continue;
    st[n].ab = sorted.includes(n) ? 0 : st[n].ab+1;
  }

  // check pending pick against this draw result
  if(pendingPick) {
    const hits = {};
    for(const [k,nums] of Object.entries(pendingPick.strategies)) {
      hits[k] = nums.filter(n => sorted.includes(n)).length;
    }
    pickLog.unshift({period:pv, strategies:pendingPick.strategies, result:sorted, hits, ts:pendingPick.ts});
    pendingPick = null;
    savePickLog();
  }

  // add record
  const extraNum=parseInt(document.getElementById('inp-extra')?.value||'0')||0;
  rec.unshift({p:pv,dt:new Date().toISOString().split('T')[0],n:sorted,e:extraNum});
  if(document.getElementById('inp-extra')) document.getElementById('inp-extra').value='';
  ANNUAL = buildAnnual(rec);
  save();

  lastReport={period:pv,nums:sorted,drawn,zoneDist:zd,repeatNums};

  // clear inputs
  document.getElementById('inp-period').value='';
  ni.forEach(i=>{i.value='';});

  updateHdr();
  go('pick');
}

// ── KEYBOARD SHORTCUTS ─────────────────────────────────────
document.getElementById('inp-period').addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key==='\t') document.querySelectorAll('.ni')[0].focus();
});
document.querySelectorAll('.ni').forEach((inp,i,all)=>{
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter') i<all.length-1 ? all[i+1].focus() : addDraw();
  });
  inp.addEventListener('input',()=>{
    if(inp.value.length>=2&&i<all.length-1) all[i+1].focus();
  });
});

// ── HEADER ─────────────────────────────────────────────────
function updateHdr(){
  const r=rec[0];
  document.getElementById('hdr-info').innerHTML=r
    ?`${r.draw||r.p}（${r.dt||''}）<br>${r.n.map(f2).join(' ')} <span style='color:#fde68a'>+${r.e||'?'}</span>`
    :'尚無紀錄';
}

// ── INIT ───────────────────────────────────────────────────
load();
updateHdr();
render();
</script>
